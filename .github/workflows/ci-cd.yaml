name: AKS CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'k8s/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'k8s/**'
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

env:
  ACR_NAME: project4acrkashm
  ACR_SERVER: project4acrkashm.azurecr.io
  AKS_CLUSTER: devops-project4-aks
  AKS_RG: devops-project4-dev-rg
  NAMESPACE: devops-app
  DEPLOYMENT: devops-flask-app
  IMAGE_NAME: devops-flask-app

jobs:
  # Validate
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Kubernetes manifests (kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7
        with:
          args: >
            -summary
            -strict
            -ignore-missing-schemas
            -kubernetes-version 1.29.0
            k8s/namespace.yaml
            k8s/configmap.yaml
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/hpa.yaml
            k8s/resource-quota.yaml

      - name: Validate Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          ignore: DL3008,DL3009

  # Build & Push
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Building image tag: ${SHORT_SHA}"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Deploy
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      # Fix: required for AAD-enabled clusters
      - name: Install kubelogin
        uses: azure/use-kubelogin@v2
        with:
          kubelogin-version: 'latest'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RG }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      # Fix: make kubeconfig use the Azure CLI token (non-interactive in CI)
      - name: Convert kubeconfig for non-interactive login
        run: |
          kubelogin convert-kubeconfig -l azurecli

      - name: Deploy to AKS with rolling update
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            flask-app=${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Verify deployment health
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc -n ${{ env.NAMESPACE }}
          EXTERNAL_IP=$(kubectl get svc devops-flask-svc -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "App running at: http://${EXTERNAL_IP}"
          sleep 15
          curl -f "http://${EXTERNAL_IP}/health/live"
          echo "Health check passed!"