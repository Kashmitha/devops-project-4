apiVersion: v1
kind: Service
metadata:
  name: devops-flask-svc
  namespace: devops-app
  labels:
    app: devops-flask-app
    project: devops-project-4
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health/live"
spec:
  type: LoadBalancer
  selector:
    app: devops-flask-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  sessionAffinity: None