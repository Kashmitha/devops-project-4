apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-flask-app
  namespace: devops-app
  labels:
    app: devops-flask-app
    version: "1.1.0"
    project: devops-project-4
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Flask app deployed on AKS 1.33.7 — DevOps Project 4"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-flask-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-flask-app
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: flask-app
          image: project4acrkashm.azurecr.io/devops-flask-app:1.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Volume mounts REQUIRED for readOnlyRootFilesystem
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/__pycache__

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 15
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

      # Volumes emptyDir gives writable in-memory space
      volumes:
        - name: tmp-dir
          emptyDir:
            medium: Memory    # In-memory tmpfs — fast and secure
            sizeLimit: 64Mi
        - name: app-cache
          emptyDir:
            sizeLimit: 32Mi

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: devops-flask-app
      terminationGracePeriodSeconds: 30