apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-flask-app
  namespace: devops-app
  labels:
    app: devops-flask-app
    version: "1.0.0"
    project: devops-project-4
  annotaions:
    deployment.kubernetes.io/revison: "1"
    description: "Flask app deployed on AKS 1.33.7 - DevOps Project 4"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-flask-app
  
  # Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: devops-flask-app
        version: "1.0.0"
    spec:
      # Security context for the pod
      securityContext:
        runAsNonRoot: root
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: flask-app
          image: project4acrkashm.azurecr.io/devops-flask-app:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          # Load env vars from Configmap
          envForm:
            - configMapRef:
                name: app-config
            
          # Resource request and limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Is the app alive
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # Is the app ready to serve traffic
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Give the app some time to start up
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 10
            periodSeconds: 5

          # Security hardening
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Spread pods across nodes
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: devops-flask-app

          terminationGracePeriodSeconds: 30