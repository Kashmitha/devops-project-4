persistence:
  enabled: false

service:
  type: LoadBalancer
  port: 80

adminUser: admin
adminPassword: "DevOpsProject4"

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        access: proxy
        editable: true
        jsonData:
          timeInterval: "30s"

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    kubernetes-cluster:
      gnetId: 7249
      revision: 1
      datasource: Prometheus
    kubernetes-views-pods:
      gnetId: 15760
      revision: 37
      datasource: Prometheus
    k8s-resource-monitoring:
      gnetId: 17375
      revision: 7
      datasource: Prometheus

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/"
  analytics:
    reporting_enabled: false
    check_for_updates: false
  log:
    level: warn